services:
  ai-emr:
    build: .
    container_name: ai-emr
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: ai-emr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_emr
      POSTGRES_USER: ai_emr
      POSTGRES_PASSWORD: ai_emr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai-emr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
